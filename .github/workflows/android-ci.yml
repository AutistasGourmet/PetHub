name: Android CI

# 1. Configurar los disparadores (Triggers)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. Definir los trabajos (Jobs)
jobs:
  build:
    # Levantar un entorno con la última versión de Ubuntu
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Descargar el código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # Paso 2: Configurar el entorno de Java (JDK 17)
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Paso 3: Dar permisos de ejecución a Gradle (Linux/Mac)
    - name: Otorgar permisos a gradlew
      run: chmod +x ./gradlew

    # Paso 4: Ejecutar las pruebas unitarias
    - name: Ejecutar pruebas unitarias (Unit Tests)
      run: ./gradlew testDebugUnitTest

    # Paso 5: Compilar la aplicación (Generar el APK de debug)
    - name: Compilar APK (Build)
      run: ./gradlew assembleDebug

    # (Opcional) Paso 6: Guardar el APK generado como un "artefacto" para poder descargarlo desde GitHub
    - name: Subir APK generado
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
